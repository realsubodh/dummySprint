<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HMS - Upcoming Bookings</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">Hotel Management</div>
    <div class="nav-links" id="navbar-links"></div>
    <div class="d-flex align-center gap-3">
      <span id="user-display" style="font-weight: 500;"></span>
      <button class="btn btn-secondary" onclick="window.HMS.logout()">Logout</button>
    </div>
  </nav>

  <main class="container">
    <h2 class="mb-3">Upcoming Bookings</h2>

    <div class="dashboard-grid" id="bookings-container">
      <!-- Inject via JS -->
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/reservation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = window.HMS.checkAuth();
      if(!user) return;
      window.HMS.renderNavbar();

      const container = document.getElementById('bookings-container');
      let bookings = [];

      if (user.role === 'customer') {
        bookings = window.HMS_Reservation.getUserBookings(user.userId);
      } else {
        bookings = window.HMS.getBookings();
      }

      // Filter for upcoming/active
      const active = bookings.filter(b => ['pending', 'approved', 'checked-in'].includes(b.status));

      if (active.length === 0) {
        container.innerHTML = `<p style="grid-column: 1 / -1;">No upcoming or active bookings found.</p>`;
        return;
      }

      container.innerHTML = active.map(b => `
        <div class="card p-3">
          <div class="d-flex space-between mb-1">
            <strong>${b.bookingId}</strong>
            <span class="badge badge-success">${b.status}</span>
          </div>
          <p class="mb-1" style="color:var(--text-primary);">${b.roomType} Room ${b.roomNumber ? `#${b.roomNumber}` : '(Unassigned)'}</p>
          <p style="font-size:0.875rem;"><strong>In:</strong> ${b.checkIn}</p>
          <p style="font-size:0.875rem;"><strong>Out:</strong> ${b.checkOut}</p>
          ${user.role === 'admin' ? `<p style="font-size:0.875rem; color:var(--primary-color);"><strong>User:</strong> ${b.userId}</p>` : ''}
        </div>
      `).join('');
    });
  </script>
</body>
</html>
