<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HMS - Payment</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">Hotel Management</div>
    <div class="nav-links" id="navbar-links"></div>
    <div class="d-flex align-center gap-3">
      <span id="user-display" style="font-weight: 500;"></span>
      <button class="btn btn-secondary" onclick="window.HMS.logout()">Logout</button>
    </div>
  </nav>

  <main class="container center-wrapper" style="min-height: calc(100vh - 150px);">
    <div class="card" style="width: 100%; max-width: 500px;">
      <h2 class="mb-3 text-center">Secure Payment</h2>
      
      <div id="alertBox" class="alert"></div>

      <div class="mb-3" style="background: var(--bg-color); padding: 1rem; border-radius: var(--radius-md); text-align: center;">
        <p>Total Amount to Pay</p>
        <h3 id="displayAmount" style="color: var(--primary-color); font-size: 2rem;">$0.00</h3>
      </div>

      <form id="paymentForm">
        <div class="form-group">
          <label>Payment Mode</label>
          <select id="payMode" class="form-control">
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
          </select>
        </div>

        <div class="form-group">
          <label>Cardholder Name</label>
          <input type="text" id="cardName" class="form-control" minlength="10" required placeholder="Name as on card">
        </div>

        <div class="form-group">
          <label>Card Number</label>
          <input type="text" id="cardNum" class="form-control" minlength="16" maxlength="16" pattern="\d{16}" required placeholder="1234567890123456">
        </div>

        <div class="d-flex gap-2">
          <div class="form-group" style="flex:1;">
            <label>Expiry Date</label>
            <input type="text" id="cardExp" class="form-control" pattern="(0[1-9]|1[0-2])\/\d{2}" placeholder="MM/YY" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label>CVV</label>
            <input type="password" id="cardCvv" class="form-control" minlength="3" maxlength="3" pattern="\d{3}" placeholder="123" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-2" id="payBtn">Pay Now</button>
      </form>
    </div>
  </main>

  <!-- Notification Modal -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal-content text-center">
      <h2 style="color: var(--secondary-color); margin-bottom: 1rem;">Payment Successful!</h2>
      <p id="txText" class="mb-2"></p>
      <div style="background:#FEE2E2;border-radius:8px;padding:1rem;margin-bottom:1.5rem;">
        <h4 style="color:#991B1B;">Thank you for choosing us</h4>
        <p style="font-size:0.9rem;">Your checkout is complete. Please let us know how we did.</p>
      </div>
      <button class="btn btn-primary" onclick="window.location.href='support.html'">Go to Support Page</button>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/reservation.js"></script>
  <script src="js/billing.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = window.HMS.checkAuth(['Customer']);
      if(!user) return;
      window.HMS.renderNavbar();

      const urlParams = new URLSearchParams(window.location.search);
      const bId = urlParams.get('bId');
      const amt = urlParams.get('amt');

      if (!bId || !amt) {
        window.HMS.showAlert('Invalid payment parameters.', 'error');
        document.getElementById('payBtn').disabled = true;
        return;
      }

      document.getElementById('displayAmount').textContent = `$${parseFloat(amt).toFixed(2)}`;

      document.getElementById('paymentForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const mode = document.getElementById('payMode').value;
        const txnId = window.HMS_Billing.processPayment(bId, parseFloat(amt), mode);

        document.getElementById('txText').innerHTML = `Transaction ID: <strong>${txnId}</strong>`;
        window.HMS.showModal('checkoutModal');
      });
    });
  </script>
</body>
</html>
