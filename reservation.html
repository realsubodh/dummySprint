<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HMS - Reservation</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">Hotel Management</div>
    <div class="nav-links" id="navbar-links"></div>
    <div class="d-flex align-center gap-3">
      <span id="user-display" style="font-weight: 500;"></span>
      <button class="btn btn-secondary" onclick="window.HMS.logout()">Logout</button>
    </div>
  </nav>

  <main class="container">
    <div id="alertBox" class="alert"></div>

    <!-- CUSTOMER VIEW -->
    <div id="customer-view" style="display:none;">
      <h2 class="mb-3">Make a Reservation</h2>
      <div class="card" style="max-width: 600px;">
        <form id="reservationForm">
          <div class="form-group">
            <label>Check-in Date</label>
            <input type="date" id="checkIn" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Check-out Date</label>
            <input type="date" id="checkOut" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Room Type</label>
            <select id="roomType" class="form-control" required>
              <option value="Single">Single ($100/night)</option>
              <option value="Double">Double ($150/night)</option>
              <option value="Suite">Suite ($300/night)</option>
              <option value="Deluxe">Deluxe ($500/night)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Guest Name</label>
            <input type="text" id="guestName" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Contact Number</label>
            <input type="text" id="contactInfo" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary mt-2">Book Room</button>
        </form>
      </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="admin-view" style="display:none;">
      <h2 class="mb-3">Manage Reservations</h2>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Booking ID</th>
              <th>User ID</th>
              <th>Room Type</th>
              <th>Dates</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminReservationTable">
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/reservation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = window.HMS.checkAuth();
      if(!user) return;
      window.HMS.renderNavbar();

      const today = new Date().toISOString().split('T')[0];
      const checkInInput = document.getElementById('checkIn');
      const checkOutInput = document.getElementById('checkOut');
      if(checkInInput) checkInInput.min = today;
      if(checkOutInput) checkOutInput.min = today;

      if (user.role === 'Customer') {
        document.getElementById('customer-view').style.display = 'block';
        
        // Auto fill details if applicable
        document.getElementById('guestName').value = user.name;

        document.getElementById('reservationForm').addEventListener('submit', (e) => {
          e.preventDefault();
          const checkIn = document.getElementById('checkIn').value;
          const checkOut = document.getElementById('checkOut').value;
          
          if(new Date(checkOut) <= new Date(checkIn)) {
            window.HMS.showAlert("Check-out date must be after check-in date", 'error');
            return;
          }

          const roomType = document.getElementById('roomType').value;
          const name = document.getElementById('guestName').value;
          const contact = document.getElementById('contactInfo').value;

          const res = window.HMS_Reservation.createBooking(user.userId, checkIn, checkOut, roomType, name, contact);
          window.HMS.showAlert(`Reservation Successful! Booking ID: ${res.bookingId}`, 'success');
          document.getElementById('reservationForm').reset();
        });

      } else {
        document.getElementById('admin-view').style.display = 'block';
        renderAdminTable();
      }
    });

    function renderAdminTable() {
      const tbody = document.getElementById('adminReservationTable');
      const bookings = window.HMS.getBookings().reverse(); // new first
      
      tbody.innerHTML = bookings.map(b => `
        <tr>
          <td>${b.bookingId}</td>
          <td>${b.userId}</td>
          <td>${b.roomType}</td>
          <td>${b.checkIn} to ${b.checkOut}</td>
          <td>
            <span class="badge ${b.status === 'Approved' || b.status==='Checked-in' ? 'badge-success' : b.status === 'Rejected' ? 'badge-danger' : 'badge-warning'}">
              ${b.status}
            </span>
          </td>
          <td>
            ${b.status === 'Pending' ? `
              <select class="form-control" style="width: auto; display: inline-block; padding: 0.25rem;" onchange="handleAction('${b.bookingId}', this.value)">
                <option value="">Select Action</option>
                <option value="Approved">Approve</option>
                <option value="Rejected">Reject</option>
              </select>
            ` : (b.status === 'Approved' ? `
              <button class="btn btn-primary" style="padding: 0.5rem;" onclick="handleAction('${b.bookingId}', 'Checked-in')">Check-in</button>
            ` : '-')}
          </td>
        </tr>
      `).join('');
    }

    window.handleAction = (bookingId, action) => {
      if(!action) return;
      if (action === 'Approved') {
        const roomNum = prompt(`Assign Room Number for Booking ${bookingId}:`);
        if(roomNum) {
          window.HMS_Reservation.updateBookingStatus(bookingId, 'Approved', roomNum);
          renderAdminTable();
        } else {
          // Reset select
          renderAdminTable();
        }
      } else {
        window.HMS_Reservation.updateBookingStatus(bookingId, action);
        renderAdminTable();
      }
    };
  </script>
</body>
</html>
