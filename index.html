<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HMS - Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="center-wrapper" style="padding: 2rem 0;">

  <div class="card" style="width: 100%; max-width: 500px;">
    <h2 class="text-center mb-1" style="color: var(--primary-color);">Create Account</h2>
    <p class="text-center mb-3">Join HMS to book rooms seamlessly</p>

    <div id="alertBox" class="alert"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" class="form-control" maxlength="50" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" required placeholder="john@example.com" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" title="Please provide a valid email address with a domain (e.g., user@domain.com)">
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="text" id="mobile" class="form-control" pattern="^\+[1-9]{1,3}\d{10}$" required
          title="Country code + 10 digits (e.g. +12345678900)">
        <small style="color: var(--text-secondary); font-size: 12px;">Format: +XX followed by 10 digits</small>
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea id="address" class="form-control" rows="2" required></textarea>
      </div>
      <div class="form-group">
        <label>Preferred UserID</label>
        <input type="text" id="userId" class="form-control" minlength="5" maxlength="20" required
          placeholder="5-20 characters">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required
          placeholder="Min 8 chars, 1 Upper, 1 Lower, 1 Special">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role" class="form-control">
          <option value="customer">Customer</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="d-flex gap-2 mb-2 mt-4">
        <button type="submit" class="btn btn-primary" style="flex:1;">Register</button>
        <button type="reset" class="btn btn-secondary" style="flex:1;">Reset</button>
      </div>

      <div class="text-center">
        <p>Already have an account? <a href="index.html">Login here</a></p>
      </div>
    </form>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');

    function checkPasswordsMatch() {
      if (confirmPasswordInput.value === '') return;
      if (passwordInput.value !== confirmPasswordInput.value) {
        confirmPasswordInput.setCustomValidity('Passwords do not match.');
      } else {
        confirmPasswordInput.setCustomValidity('');
      }
    }

    passwordInput.addEventListener('input', checkPasswordsMatch);
    confirmPasswordInput.addEventListener('input', checkPasswordsMatch);

    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        mobile: document.getElementById('mobile').value,
        address: document.getElementById('address').value,
        userId: document.getElementById('userId').value,
        password: document.getElementById('password').value,
        confirmPassword: document.getElementById('confirmPassword').value,
        role: document.getElementById('role').value
      };

      const res = window.HMS_Auth.register(data);
      if (res.success) {
        window.HMS.showAlert(res.msg, 'success');
        document.getElementById('registerForm').reset();
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      } else {
        window.HMS.showAlert(res.msg, 'error');
      }
    });
  </script>
</body>

</html>
