<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HMS - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="login-page-wrapper">
    <div class="split-container">
      
      <div class="split-left">
        <div class="left-top-text">A WISE QUOTE <span class="line"></span></div>
        <div class="left-bottom-text">
          <h1>Get<br>Everything<br>You Want</h1>
          <p>You can get everything you want if you work hard, trust the process, and stick to the plan.</p>
        </div>
      </div>

      <div class="split-right">
        <div class="brand-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          HMS
        </div>

        <div class="login-header">
          <h2>Welcome Back</h2>
          <p>Enter your credentials to continue.</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label>User ID</label>
            <input type="text" id="userId" class="form-control" required placeholder="Enter your User ID">
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input type="password" id="password" class="form-control" required placeholder="Enter your password">
              <span class="eye-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </span>
            </div>
          </div>

          <div class="form-group">
            <label>Role</label>
            <select id="role" class="form-control select-icon">
              <option value="customer">Customer</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <div class="form-actions-row">
            <label class="remember-me">
              <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot Password</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-dark-override">Sign In</button>
          
          <button type="button" class="btn btn-secondary btn-block mt-2" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="https://img.icons8.com/color/20/000000/google-logo.png" alt="Google"> Sign In with Google
          </button>
          
          <div class="text-center register-link mt-4">
            <p>Don't have an account? <a href="register.html">Sign Up</a></p>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto redirect if already logged in
      const user = window.HMS ? window.HMS.getCurrentUser() : null;
      if (user) window.location.href = 'dashboard.html';

      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const userId = document.getElementById('userId').value;
        const pass = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        if(window.HMS_Auth) {
          const res = window.HMS_Auth.login(userId, pass, role);
          if (res.success) {
            window.location.href = 'dashboard.html';
          } else {
            window.HMS.showAlert(res.msg, 'error');
          }
        }
      });
    });
  </script>
</body>

</html>
