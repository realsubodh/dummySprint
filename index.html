<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HMS - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="center-wrapper">

  <div class="card" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-2" style="color: var(--primary-color);">Welcome to HMS</h2>
    <p class="text-center mb-3">Sign in to your account</p>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>User ID</label>
        <input type="text" id="userId" class="form-control" required placeholder="Enter your User ID">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required placeholder="Enter password">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role" class="form-control">
          <option value="customer">Customer</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block mb-2">Login</button>
      <div class="text-center">
        <p>New to HMS? <a href="register.html">Register here</a></p>
      </div>
    </form>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto redirect if already logged in
      const user = window.HMS.getCurrentUser();
      if (user) window.location.href = 'dashboard.html';

      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const userId = document.getElementById('userId').value;
        const pass = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        const res = window.HMS_Auth.login(userId, pass, role);
        if (res.success) {
          window.location.href = 'dashboard.html';
        } else {
          window.HMS.showAlert(res.msg, 'error');
        }
      });
    });
  </script>
</body>

</html>
